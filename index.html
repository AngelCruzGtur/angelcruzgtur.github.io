<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Minecraft</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		html, body {
			width: 100%;
			height: 100%;
			overflow: hidden;
		}

		body {
			font-family: 'Press Start 2P', cursive;
			background: #000;
		}

		.bg-video {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
			z-index: 0;
			transition: opacity 0.8s ease;
		}

		#scene {
			position: fixed;
			top: 0;
			left: 0;
			width: 1920px;
			height: 1080px;
			transform-origin: top left;
			z-index: 1;
		}

		.overlay {
			position: absolute;
			inset: 0;
			background: transparent;
		}

		.logo {
			position: absolute;
			top: 40px;
			left: 50%;
			transform: translateX(-50%);
		}

		.logo img {
			width: 650px;
			image-rendering: pixelated;
		}

		.smalltitle {
			position: absolute;
			top: 130px;
			right: 170px;
			font-size: 30px;
			color: #ffe600;
			transform: rotate(-18deg);
			text-shadow: 3px 3px 0 #444;
			animation: pulse 1s infinite ease-in-out;
		}

		@keyframes pulse {
			0%   { transform: rotate(-18deg) scale(1); }
			50%  { transform: rotate(-18deg) scale(1.2); }
			100% { transform: rotate(-18deg) scale(1); }
		}

		.menu {
			position: absolute;
			top: 265px;
			left: 50%;
			transform: translateX(-50%);
			width: 460px;
			display: flex;
			flex-direction: column;
			gap: 10px;
		}

		.menu button {
			font-family: 'Press Start 2P', cursive;
			font-size: 18px;
			padding: 28px 20px;
			background: #c6c6c6;
			color: #3f3f3f;
			border: 3px solid #1d1d1d;
			box-shadow:
				inset 2px 2px 0 #f3f3f3,
				inset -2px -2px 0 #7a7a7a;
			cursor: pointer;
		}

		.menu button:hover {
			background: #9b9b9b;
		}

		.new-tag {
			position: absolute;
			right: -26px;
			bottom: 82px;
			font-size: 16px;
			color: #28ff00;
			background: #5f5f5f;
			padding: 6px 8px;
			border: 2px solid #2f2f2f;
			text-shadow: 2px 2px 0 #1d1d1d;
		}

		.player-panel {
			position: absolute;
			right: 90px;
			top: 240px;
			display: flex;
			flex-direction: column;
			align-items: flex-start;
			gap: 6px;
		}

		.player-name {
			font-size: 26px;
			color: white;
			background: rgba(0, 0, 0, 0.5);
			padding: 8px 12px;
		}

		.character {
			position: absolute;
			right: 105px;
			top: 280px;
			border: none;
			width: 276px;
			height: 368px;
		}

		.icon-row {
			position: absolute;
			bottom: 40px;
			left: 50px;
			display: flex;
			gap: 6px;
		}

		.icon-row img {
			width: 64px;
			height: 64px;
			background: #c6c6c6;
			border: 3px solid #1d1d1d;
			box-shadow:
				inset 2px 2px 0 #f3f3f3,
				inset -2px -2px 0 #7a7a7a;
			padding: 4px;
			image-rendering: pixelated;
		}

		.mc-modal {
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.85);
			display: none;
			justify-content: center;
			align-items: center;
			z-index: 999;
		}

		.mc-modal.show {
			display: flex;
		}

		.mc-modal-box {
			position: relative;
			width: 92vw;
			height: 92vh;
			max-width: 1600px;
			background: transparent;
		}

		.mc-modal-box iframe {
			width: 100%;
			height: 100%;
			border: none;
		}

		#toast {
			position: fixed;
			bottom: 24px;
			right: 24px;
			z-index: 9999;
			font-family: 'Press Start 2P', cursive;
			font-size: 11px;
			padding: 12px 18px;
			background: #c6c6c6;
			color: #3f3f3f;
			border: 3px solid #1d1d1d;
			box-shadow:
				inset 2px 2px 0 #f3f3f3,
				inset -2px -2px 0 #7a7a7a;
			white-space: nowrap;
			pointer-events: none;
			opacity: 0;
			transform: translateY(10px);
			transition: opacity 0.2s ease, transform 0.2s ease;
		}

		#toast.show {
			opacity: 1;
			transform: translateY(0);
		}

		#slime-canvas {
			position: fixed;
			inset: 0;
			width: 100vw;
			height: 100vh;
			pointer-events: none;
			z-index: 2;
		}
	</style>
</head>

<body>

	<video class="bg-video" autoplay muted playsinline id="bgVideo0" style="opacity:1;"></video>
	<video class="bg-video" autoplay muted playsinline id="bgVideo1" style="opacity:0;"></video>

	<div id="scene">
		<div class="overlay">
			<div class="logo">
				<img src="minecraft_title.png" alt="Minecraft Title">
			</div>
			<div class="smalltitle">Internships!!!</div>

			<div class="menu">
				<button onclick="openExperience()">Experience</button>
				<button onclick="openProjects()">Projects</button>
				<button onclick="openAbout()">About Me</button>
				<button onclick="downloadResume()">Resume</button>
				<div class="new-tag">Updated</div>
			</div>

			<div class="player-panel">
				<div class="player-name">Angel Cruz</div>
			</div>

			<iframe
				id="characterFrame"
				src="character.html"
				class="character">
			</iframe>

			<div class="icon-row">
				<img src="media/linkedin.png" alt="LinkedIn">
				<img src="media/github.png" alt="GitHub">
				<img src="media/gmail.png" alt="">
			</div>
		</div>
	</div>

	<!-- Experience modal -->
	<div id="experiencePopup" class="mc-modal">
		<div class="mc-modal-box">
			<iframe src="experience.html"></iframe>
		</div>
	</div>

	<!-- Projects modal -->
	<div id="projectsPopup" class="mc-modal">
		<div class="mc-modal-box">
			<iframe src="projects.html"></iframe>
		</div>
	</div>

	<!-- About Me modal -->
	<div id="aboutPopup" class="mc-modal">
		<div class="mc-modal-box">
			<iframe src="about.html"></iframe>
		</div>
	</div>

	<div id="toast">Resume Downloaded!</div>

	<script>
		// Scale scene
		function scaleScene() {
			const scene = document.getElementById('scene');
			const scaleX = window.innerWidth / 1920;
			const scaleY = window.innerHeight / 1080;
			const scale = Math.min(scaleX, scaleY);
			const offsetX = (window.innerWidth - 1920 * scale) / 2;
			const offsetY = (window.innerHeight - 1080 * scale) / 2;
			scene.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
		}

		scaleScene();
		window.addEventListener('resize', scaleScene);

		// Forward mouse to character iframe
		window.addEventListener('mousemove', e => {
			const iframe = document.getElementById('characterFrame');
			if (iframe && iframe.contentWindow) {
				iframe.contentWindow.postMessage({ mouseX: e.clientX, mouseY: e.clientY }, '*');
			}
		});

		// ── Video crossfade ───────────────────────────────────────────
		const VIDEO_COUNT = 7;
		const videoPaths = [];
		for (let i = 1; i <= VIDEO_COUNT; i++) {
			videoPaths.push(`videos/bg${i}.MP4`);
		}

		// Preload all clips in hidden elements
		const preloaded = videoPaths.map(src => {
			const v = document.createElement('video');
			v.src = src;
			v.preload = 'auto';
			v.muted = true;
			v.style.display = 'none';
			document.body.appendChild(v);
			return v;
		});

		const players = [
			document.getElementById('bgVideo0'),
			document.getElementById('bgVideo1')
		];

		let active = 0;
		let lastIndex = -1;
		let transitioning = false;

		function pickNextIndex() {
			let index;
			do {
				index = Math.floor(Math.random() * preloaded.length);
			} while (index === lastIndex && preloaded.length > 1);
			lastIndex = index;
			return index;
		}

		function crossfadeTo(index) {
			transitioning = true;
			const next = 1 - active;
			const incoming = players[next];
			const outgoing = players[active];

			// Reset incoming player fully before loading new src
			incoming.pause();
			incoming.removeAttribute('src');
			incoming.load();

			incoming.src = videoPaths[index];
			incoming.load();

			incoming.addEventListener('canplay', function onCanPlay() {
				incoming.removeEventListener('canplay', onCanPlay);
				incoming.play().catch(() => {});
				incoming.style.opacity = '1';
				outgoing.style.opacity = '0';
				active = next;
				transitioning = false;
			}, { once: true });

			// Fallback: if canplay never fires, force switch after 1s
			setTimeout(() => {
				if (transitioning) {
					incoming.play().catch(() => {});
					incoming.style.opacity = '1';
					outgoing.style.opacity = '0';
					active = next;
					transitioning = false;
				}
			}, 1000);
		}

		// Only the active player's ended event triggers a transition
		function onEnded(playerIndex) {
			return function() {
				if (playerIndex === active && !transitioning) {
					crossfadeTo(pickNextIndex());
				}
			};
		}

		players[0].addEventListener('ended', onEnded(0));
		players[1].addEventListener('ended', onEnded(1));

		// Kick off first video
		const firstIndex = pickNextIndex();
		players[0].src = videoPaths[firstIndex];
		players[0].load();
		players[0].play().catch(() => {});
		players[0].style.opacity = '1';
		players[1].style.opacity = '0';
		// ─────────────────────────────────────────────────────────────

		// Experience modal
		function openExperience() {
			document.getElementById('experiencePopup').classList.add('show');
		}
		function closeExperience() {
			document.getElementById('experiencePopup').classList.remove('show');
		}
		document.getElementById('experiencePopup').addEventListener('click', e => {
			if (e.target.id === 'experiencePopup') closeExperience();
		});

		// Projects modal
		function openProjects() {
			document.getElementById('projectsPopup').classList.add('show');
		}
		function closeProjects() {
			document.getElementById('projectsPopup').classList.remove('show');
		}
		document.getElementById('projectsPopup').addEventListener('click', e => {
			if (e.target.id === 'projectsPopup') closeProjects();
		});

		// About Me modal
		function openAbout() {
			document.getElementById('aboutPopup').classList.add('show');
		}
		function closeAbout() {
			document.getElementById('aboutPopup').classList.remove('show');
		}
		document.getElementById('aboutPopup').addEventListener('click', e => {
			if (e.target.id === 'aboutPopup') closeAbout();
		});

		// Listen for close messages from iframes
		window.addEventListener('message', e => {
			if (e.data === 'closeExperience') closeExperience();
			if (e.data === 'closeProjects')   closeProjects();
			if (e.data === 'closeAbout')      closeAbout();
		});

		// Resume download
		let toastTimer = null;
		function downloadResume() {
			const link = document.createElement('a');
			link.href = 'resume.pdf';
			link.download = 'Angel_Cruz_Resume.pdf';
			document.body.appendChild(link);
			link.click();
			document.body.removeChild(link);

			const toast = document.getElementById('toast');
			toast.classList.add('show');
			clearTimeout(toastTimer);
			toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
		}
	</script>

	<canvas id="slime-canvas"></canvas>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r122/three.min.js"></script>
	<script src="slime.js"></script>

</body>
</html>
