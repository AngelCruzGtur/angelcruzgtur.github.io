<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
    mermaid.initialize({
      startOnLoad: false,
      theme: "base",
      securityLevel: "loose",
      flowchart: { curve: "basis", nodeSpacing: 55, rankSpacing: 70, padding: 18 },
      themeVariables: {
        background: "#1f1f1f",
        fontFamily: "Trebuchet MS, Verdana, sans-serif",
        primaryColor: "#3f4f5f",
        primaryTextColor: "#f8fafc",
        primaryBorderColor: "#cbd5e1",
        secondaryColor: "#4f6d5f",
        secondaryTextColor: "#f8fafc",
        secondaryBorderColor: "#cbd5e1",
        tertiaryColor: "#6b5f4a",
        tertiaryTextColor: "#f8fafc",
        tertiaryBorderColor: "#f5d06f",
        lineColor: "#c9a84c",
        nodeBorder: "#cbd5e1",
        clusterBkg: "#252525",
        clusterBorder: "#444"
      }
    });
    window.renderMermaid = async function(code, containerId) {
      const target = document.getElementById(containerId);
      if (!target) return;
      target.innerHTML = "";
      const id = "fc-" + Date.now();
      const { svg } = await mermaid.render(id, code);
      target.innerHTML = svg;
    };
  </script>

  <style>
    :root {
      --bg:     #2e2e2e;
      --white:  #f2f2ee;
      --muted:  rgba(242,242,238,0.62);
      --border: rgba(200,200,200,0.15);
      --gold:   #c9a84c;
      --active: #4a7c59;
      --active-glow: rgba(74,124,89,0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      font-family: "Trebuchet MS", "Verdana", sans-serif;
      color: var(--white);
      font-size: clamp(13px, 1.1vw, 16px);
    }

    body::before {
      content: "";
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 110%, rgba(90,90,90,0.38) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% -10%, rgba(20,20,20,0.85) 0%, transparent 70%),
        radial-gradient(ellipse 100% 80% at 50% 50%, #1a1a1a 0%, #2e2e2e 100%);
      pointer-events: none;
    }

    .close-btn {
      position: fixed;
      top: 1rem; right: 1.25rem;
      z-index: 100;
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(9px, 0.85vw, 13px);
      padding: 0.6rem 1rem;
      background: #c6c6c6;
      color: #3f3f3f;
      border: 3px solid #1d1d1d;
      box-shadow: inset 2px 2px 0 #f3f3f3, inset -2px -2px 0 #7a7a7a;
      cursor: pointer;
      letter-spacing: .05em;
    }
    .close-btn:hover { background: #9b9b9b; }

    /* ── SPLIT LAYOUT ── */
    .layout {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    .col {
      padding: clamp(3.5rem, 6vh, 5rem) clamp(1.5rem, 3vw, 2.5rem) clamp(2rem, 4vh, 3rem);
      overflow-y: auto;
    }

    .col-built {
      border-right: 1px solid var(--border);
    }

    .col-wip {
      background: rgba(0,0,0,0.12);
    }

    .section-label {
      font-size: clamp(0.52rem, 0.65vw, 0.68rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9b9b9b;
      margin-bottom: 0.45rem;
    }

    .page-title {
      font-family: Georgia, serif;
      font-size: clamp(1.3rem, 2.2vw, 2rem);
      font-style: italic;
      font-weight: 300;
      margin-bottom: clamp(1.2rem, 3vh, 2rem);
      letter-spacing: -0.02em;
    }

    .col-wip .page-title {
      color: #a8c9a0;
    }

    /* ── DIVIDER LINE ── */
    .col-built .page-title::after {
      content: '';
      display: block;
      width: 2rem;
      height: 2px;
      background: var(--gold);
      margin-top: 0.6rem;
    }

    .col-wip .page-title::after {
      content: '';
      display: block;
      width: 2rem;
      height: 2px;
      background: var(--active);
      margin-top: 0.6rem;
    }

    /* ── PROJECT LIST ── */
    .project-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .project-wrap {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: clamp(0.6rem, 1.2vh, 0.85rem);
      transition: border-color .25s;
    }
    .project-wrap.open {
      border-color: rgba(200,200,200,0.3);
    }

    .project-bar {
      display: grid;
      grid-template-columns: clamp(80px, 10vw, 130px) 1fr;
      background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
      cursor: pointer;
      transition: background .22s;
      position: relative;
    }
    .project-bar:hover,
    .project-wrap.open .project-bar {
      background: linear-gradient(145deg, rgba(255,255,255,0.09), rgba(255,255,255,0.04));
    }

    .project-bar::after {
      content: '▾';
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%) rotate(0deg);
      font-size: 0.85rem;
      color: rgba(200,200,200,0.45);
      transition: transform .35s ease, color .2s;
    }
    .project-wrap.open .project-bar::after {
      transform: translateY(-50%) rotate(180deg);
      color: var(--gold);
    }

    .project-photo {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(0.6rem, 1.2vw, 0.9rem);
      min-height: clamp(65px, 8vw, 90px);
    }
    .project-photo img {
      max-width: 75%;
      max-height: clamp(50px, 6vw, 75px);
      object-fit: contain;
      transition: transform .22s, opacity .22s;
    }
    .project-bar:hover .project-photo img { transform: scale(1.04); opacity: 0.9; }

    .project-content {
      padding: clamp(0.8rem, 1.5vw, 1.1rem) clamp(0.8rem, 1.5vw, 1.1rem) clamp(0.8rem, 1.5vw, 1.1rem) 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 2rem;
    }

    .project-top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.25rem;
      gap: 0.5rem;
    }

    .project-name {
      font-size: clamp(0.8rem, 0.95vw, 1rem);
      font-weight: 700;
    }

    .project-date {
      font-size: clamp(0.6rem, 0.72vw, 0.72rem);
      color: var(--gold);
      white-space: nowrap;
    }

    .project-type {
      font-size: clamp(0.58rem, 0.7vw, 0.7rem);
      color: #b3b3b3;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    .project-desc {
      font-size: clamp(0.72rem, 0.85vw, 0.85rem);
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 0.6rem;
    }

    .project-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .project-tag {
      font-size: clamp(0.55rem, 0.65vw, 0.65rem);
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid rgba(200,200,200,0.18);
      background: rgba(255,255,255,0.055);
      color: rgba(242,242,238,0.72);
    }

    /* ── DRAWER ── */
    .project-drawer {
      max-height: 0;
      overflow: hidden;
      transition: max-height .5s cubic-bezier(0.4,0,0.2,1);
      background: rgba(0,0,0,0.18);
    }
    .project-wrap.open .project-drawer {
      max-height: 600px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .drawer-inner {
      display: flex;
      flex-direction: column;
      gap: clamp(0.75rem, 1.5vw, 1.1rem);
      padding: clamp(0.85rem, 1.5vw, 1.2rem);
    }

    .detail-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: clamp(0.75rem, 1.2vw, 1rem);
    }

    .detail-box h3 {
      font-size: clamp(0.7rem, 0.82vw, 0.85rem);
      margin-bottom: 0.75rem;
      color: var(--white);
      letter-spacing: 0.02em;
    }

    .detail-box ul { list-style: none; display: flex; flex-direction: column; gap: 0.55rem; }
    .detail-box li {
      color: var(--muted);
      font-size: clamp(0.68rem, 0.8vw, 0.8rem);
      line-height: 1.6;
      padding-left: 1rem;
      position: relative;
    }
    .detail-box li::before {
      content: "▸";
      position: absolute; left: 0;
      color: var(--gold);
    }

    .flowchart-box {
      background: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px),
                  rgba(0,0,0,0.2);
      background-size: 24px 24px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: clamp(0.6rem, 1.2vw, 0.9rem);
      overflow: auto;
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .flowchart-box svg { width: 100%; height: auto; background: transparent; }

    .flowchart-wrap h3 {
      font-size: clamp(0.7rem, 0.82vw, 0.85rem);
      margin-bottom: 0.75rem;
      color: var(--white);
      letter-spacing: 0.02em;
    }

    /* ── WIP CARDS ── */
    .wip-list {
      display: flex;
      flex-direction: column;
      gap: clamp(0.6rem, 1.2vh, 0.85rem);
    }

    .wip-card {
      border: 1px solid rgba(74,124,89,0.3);
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(74,124,89,0.06), rgba(255,255,255,0.02));
      transition: border-color .25s, background .25s;
    }
    .wip-card:hover {
      border-color: rgba(74,124,89,0.55);
      background: linear-gradient(145deg, rgba(74,124,89,0.1), rgba(255,255,255,0.03));
    }

    .wip-inner {
      padding: clamp(0.9rem, 1.6vw, 1.2rem);
    }

    .wip-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .wip-name {
      font-size: clamp(0.82rem, 0.98vw, 1rem);
      font-weight: 700;
    }

    .wip-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: clamp(0.55rem, 0.65vw, 0.65rem);
      color: #7ec896;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .wip-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #7ec896;
      animation: blink 1.6s infinite ease-in-out;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    .wip-type {
      font-size: clamp(0.58rem, 0.7vw, 0.7rem);
      color: #8ab898;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .wip-desc {
      font-size: clamp(0.72rem, 0.85vw, 0.85rem);
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 0.65rem;
    }

    .wip-progress-wrap {
      margin-bottom: 0.65rem;
    }

    .wip-progress-label {
      display: flex;
      justify-content: space-between;
      font-size: clamp(0.55rem, 0.65vw, 0.65rem);
      color: #7b8c80;
      margin-bottom: 0.3rem;
    }

    .wip-bar {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .wip-fill {
      height: 100%;
      background: linear-gradient(90deg, #4a7c59, #7ec896);
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .wip-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .wip-tag {
      font-size: clamp(0.55rem, 0.65vw, 0.65rem);
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid rgba(74,124,89,0.35);
      background: rgba(74,124,89,0.1);
      color: #a8c9a0;
    }

    @media (max-width: 760px) {
      .layout { grid-template-columns: 1fr; }
      .col-built { border-right: none; border-bottom: 1px solid var(--border); }
      .drawer-inner { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<button class="close-btn" onclick="window.parent.postMessage('closeProjects', '*')">✕ Close</button>

<div class="layout">

  <!-- LEFT: BUILT -->
  <div class="col col-built">
    <p class="section-label">Completed</p>
    <h1 class="page-title">What I've Built</h1>
    <section class="project-list" id="projectList"></section>
  </div>

  <!-- RIGHT: WIP -->
  <div class="col col-wip">
    <p class="section-label">In Progress</p>
    <h1 class="page-title">Currently Working On</h1>
    <section class="wip-list" id="wipList"></section>
  </div>

</div>

<script>
  const graphStyle = `
classDef start fill:#3f4f5f,stroke:#cbd5e1,color:#f8fafc,stroke-width:1.5px;
classDef process fill:#4f6d5f,stroke:#cbd5e1,color:#f8fafc,stroke-width:1.5px;
classDef decision fill:#6b5f4a,stroke:#f5d06f,color:#f8fafc,stroke-width:1.5px;
classDef output fill:#5f4f63,stroke:#cbd5e1,color:#f8fafc,stroke-width:1.5px;
`;

  const projects = [
    {
      name: "Mini Me AI",
      date: "2026",
      type: "Local AI Systems",
      image: "images/mini-me-ai.png",
      desc: "A local AI assistant focused on running LLMs without relying on cloud APIs, integrating voice and real-time interaction.",
      tags: ["C++", "Python", "Ollama", "Piper", "Vosk"],
      bullets: [
        "Runs local LLM inference through Ollama instead of depending fully on external APIs.",
        "Uses voice input and text-to-speech to make the assistant feel more interactive.",
        "Connects local AI, personality behavior, and system-level constraints into one project."
      ],
      chart: `flowchart LR
  A((User Input)) --> B[Speech / Text]
  B --> C{Input Type}
  C --> D[Local LLM]
  C --> E[System Logic]
  D --> F[Response]
  E --> F
  F --> G((Voice Output))
${graphStyle}
  class A,G start;class B,D,E,F process;class C decision;`
    },
    {
      name: "WasteLess AI",
      date: "2026",
      type: "Full Stack Web App",
      image: "images/wasteless-ai.png",
      desc: "A food redistribution platform connecting restaurants with surplus food to nearby shelters using location-based matching.",
      tags: ["Next.js", "React", "Supabase", "Leaflet", "NVIDIA API"],
      bullets: [
        "Restaurants submit extra food with location, availability, quantity, and pickup windows.",
        "The app compares shelter needs, distance, urgency, and constraints before matching.",
        "Map and backend data work together so the system feels practical instead of just visual."
      ],
      chart: `flowchart LR
  A((Restaurant)) --> B[Food Listing]
  B --> C{Match Check}
  C --> D[Location Data]
  C --> E[Shelter Needs]
  C --> F[Pickup Window]
  D --> G[Matching Logic]
  E --> G
  F --> G
  G --> H[Map View]
  G --> I((Shelter))
${graphStyle}
  class A,I start;class B,D,E,F,G,H process;class C decision;`
    },
    {
      name: "ProfessorMatch",
      date: "2026",
      type: "Recommendation System",
      image: "images/professormatch.png",
      desc: "A system that ranks professors using combined datasets and explains recommendations based on student goals.",
      tags: ["Python", "pandas", "Streamlit", "FastAPI", "Data Cleaning"],
      bullets: [
        "Pulls together professor ratings, course data, and profile information.",
        "Uses ranking logic to match professors to goals like GPA, learning depth, or career value.",
        "Shows explainable results so students understand why each professor is recommended."
      ],
      chart: `flowchart LR
  A((Student Goal)) --> B{Goal Type}
  B --> C[Ratings Data]
  B --> D[Course Data]
  B --> E[Profile Data]
  C --> F[Data Cleaning]
  D --> F
  E --> F
  F --> G[Ranking Logic]
  G --> H[Streamlit UI]
  H --> I((Recommendation))
${graphStyle}
  class A,I start;class C,D,E,F,G,H process;class B decision;`
    },
    {
      name: "Roguelike Maker",
      date: "2026",
      type: "Godot Game Generator",
      image: "images/roguelike-maker.png",
      desc: "A prompt-to-playable-game system where an AI generator creates JSON settings that directly change a Godot roguelike prototype.",
      tags: ["Godot", "GDScript", "JSON", "Game Systems", "AI Generator"],
    bullets: [
      "Built a config pipeline where prompts changed player speed, enemy density, weapon type, and room sequence.",
      "Connected the generated JSON into Godot so changing the config directly changed gameplay.",
      "Implemented live config reloading, allowing instant gameplay updates without restarting the game.",
      "Enabled each prompt to generate a distinct run, increasing replayability and showcasing dynamic game generation.",
      "Implemented a map generation system using a 40x40 sprite to define and spawn the game layout."
    ],
      chart: `flowchart LR
  A((Prompt)) --> B{AI Interprets}
  B --> C[Player Speed]
  B --> D[Enemy Density]
  B --> E[Room Sequence]
  B --> F[Weapon Type]
  C --> G[JSON Config]
  D --> G
  E --> G
  F --> G
  G --> H[Godot Config Loader]
  H --> I[Game Systems]
  I --> J((Playable Roguelike))
${graphStyle}
  class A,J start;class C,D,E,F,G,H,I process;class B decision;`
    }
  ];

  const wip = [
    {
      name: "Research Paper",
      type: "Academic Writing",
      status: "Writing",
      progress: 35,
      desc: "Developing a research paper titled “Rethinking Deep Self-Attention for Character-Level Language Modeling,” where I analyze and challenge the idea that transformer models fully replace recurrent neural networks. The paper explores limitations such as fixed context windows, computational cost, and reliance on auxiliary training techniques, while proposing hybrid or sequential approaches as a more practical direction.",
      tags: ["Research", "Writing", "Self-directed"]
    },
    {
      name: "3D Models In html using Three.js",
      type: "Dev Log",
      status: "Ongoing",
      progress: 20,
      desc: "Dev log: converting images to Base64, slicing them with canvas, and mapping textures onto a Three.js slime.",
      tags: ["Three.js", "JavaScript", "Canvas"]
    },
    {
      name: "...",
      type: "TBD",
      status: "Thinking",
      progress: 0,
      desc: "Give me a problem to solve or an idea to build!",
      tags: ["???"]
    }
  ];

  // ── Render built projects ──
  const list = document.getElementById("projectList");

  projects.forEach((p, i) => {
    const chartId = `chart-${i}`;
    const wrap = document.createElement("div");
    wrap.className = "project-wrap";

    wrap.innerHTML = `
      <div class="project-bar" onclick="toggleProject(${i})">
        <div class="project-photo">
          <img src="${p.image}" alt="${p.name}">
        </div>
        <div class="project-content">
          <div class="project-top">
            <div class="project-name">${p.name}</div>
            <div class="project-date">${p.date}</div>
          </div>
          <div class="project-type">${p.type}</div>
          <div class="project-desc">${p.desc}</div>
          <div class="project-tags">${p.tags.map(t => `<span class="project-tag">${t}</span>`).join("")}</div>
        </div>
      </div>
      <div class="project-drawer">
        <div class="drawer-inner">
          <div class="detail-box">
            <h3>What it does</h3>
            <ul>${p.bullets.map(b => `<li>${b}</li>`).join("")}</ul>
          </div>
          <div class="flowchart-wrap">
            <h3>System Flow</h3>
            <div class="flowchart-box" id="${chartId}"></div>
          </div>
        </div>
      </div>
    `;

    list.appendChild(wrap);
  });

  function toggleProject(i) {
    const wraps = document.querySelectorAll(".project-wrap");
    const isOpen = wraps[i].classList.contains("open");
    wraps.forEach(w => w.classList.remove("open"));
    if (!isOpen) {
      wraps[i].classList.add("open");
      setTimeout(() => window.renderMermaid(projects[i].chart, `chart-${i}`), 80);
    }
  }

  // ── Render WIP cards ──
  const wipList = document.getElementById("wipList");

  wip.forEach(w => {
    const card = document.createElement("div");
    card.className = "wip-card";
    card.innerHTML = `
      <div class="wip-inner">
        <div class="wip-top">
          <div class="wip-name">${w.name}</div>
          <div class="wip-status"><span class="wip-dot"></span>${w.status}</div>
        </div>
        <div class="wip-type">${w.type}</div>
        <div class="wip-desc">${w.desc}</div>
        <div class="wip-progress-wrap">
          <div class="wip-progress-label"><span>Progress</span><span>${w.progress}%</span></div>
          <div class="wip-bar"><div class="wip-fill" style="width:${w.progress}%"></div></div>
        </div>
        <div class="wip-tags">${w.tags.map(t => `<span class="wip-tag">${t}</span>`).join("")}</div>
      </div>
    `;
    wipList.appendChild(card);
  });
</script>

</body>
</html>
