<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Projects</title>
	<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

	<script type="module">
		import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";

		mermaid.initialize({
			startOnLoad: false,
			theme: "base",
			securityLevel: "loose",
			flowchart: {
				curve: "basis",
				nodeSpacing: 55,
				rankSpacing: 70,
				padding: 18
			},
			themeVariables: {
				background: "#1f1f1f",
				fontFamily: "Trebuchet MS, Verdana, sans-serif",
				primaryColor: "#3f4f5f",
				primaryTextColor: "#f8fafc",
				primaryBorderColor: "#cbd5e1",
				secondaryColor: "#4f6d5f",
				secondaryTextColor: "#f8fafc",
				secondaryBorderColor: "#cbd5e1",
				tertiaryColor: "#6b5f4a",
				tertiaryTextColor: "#f8fafc",
				tertiaryBorderColor: "#f5d06f",
				lineColor: "#c9a84c",
				nodeBorder: "#cbd5e1",
				clusterBkg: "#252525",
				clusterBorder: "#444"
			}
		});

		window.renderMermaid = async function(code) {
			const target = document.getElementById("flowchart");
			target.innerHTML = "";
			const id = "flowchart-" + Date.now();
			const { svg } = await mermaid.render(id, code);
			target.innerHTML = svg;
		};
	</script>

	<style>
		:root {
			--bg: #2e2e2e;
			--white: #f2f2ee;
			--muted: rgba(242,242,238,0.62);
			--border: rgba(200,200,200,0.15);
			--gold: #c9a84c;
		}

		* { box-sizing: border-box; margin: 0; padding: 0; }

		html, body {
			width: 100%;
			min-height: 100%;
			background: var(--bg);
			font-family: "Trebuchet MS", "Verdana", sans-serif;
			color: var(--white);
		}

		body::before {
			content: "";
			position: fixed;
			inset: 0;
			z-index: 0;
			background:
				radial-gradient(ellipse 80% 60% at 20% 110%, rgba(90,90,90,0.38) 0%, transparent 60%),
				radial-gradient(ellipse 60% 50% at 80% -10%, rgba(20,20,20,0.85) 0%, transparent 70%),
				radial-gradient(ellipse 100% 80% at 50% 50%, #1a1a1a 0%, #2e2e2e 100%);
			pointer-events: none;
		}

		/* ── CLOSE BUTTON — matches experience page ── */
		.close-btn {
			position: fixed;
			top: 16px;
			right: 20px;
			z-index: 100;
			font-family: 'Press Start 2P', cursive;
			font-size: 13px;
			padding: 10px 16px;
			background: #c6c6c6;
			color: #3f3f3f;
			border: 3px solid #1d1d1d;
			box-shadow: inset 2px 2px 0 #f3f3f3, inset -2px -2px 0 #7a7a7a;
			cursor: pointer;
			letter-spacing: .05em;
		}
		.close-btn:hover { background: #9b9b9b; }

		.page {
			position: relative;
			z-index: 1;
			padding: 60px 80px;
			max-width: 1200px;
			margin: auto;
		}

		.section-label {
			font-size: 0.7rem;
			letter-spacing: 0.15em;
			text-transform: uppercase;
			color: #9b9b9b;
			margin-bottom: 10px;
		}

		.page-title {
			font-family: Georgia, serif;
			font-size: 2.6rem;
			font-style: italic;
			font-weight: 300;
			margin-bottom: 40px;
			letter-spacing: -0.02em;
		}

		.project-list {
			display: flex;
			flex-direction: column;
			gap: 22px;
		}

		.project-bar {
			display: grid;
			grid-template-columns: 250px 1fr;
			background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
			border: 1px solid var(--border);
			border-radius: 16px;
			overflow: hidden;
			transition: transform 0.22s ease, background 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
			cursor: pointer;
			box-shadow: 0 18px 45px rgba(0,0,0,0.18);
			backdrop-filter: blur(8px);
		}

		.project-bar:hover {
			background: linear-gradient(145deg, rgba(255,255,255,0.085), rgba(255,255,255,0.035));
			transform: translateY(-4px);
			border-color: rgba(200,200,200,0.28);
			box-shadow: 0 24px 58px rgba(0,0,0,0.28);
		}

		.project-photo {
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 16px;
			min-height: 120px;
		}

		.project-photo img {
			max-width: 75%;
			max-height: 100px;
			width: auto;
			height: auto;
			object-fit: contain;
			display: block;
			transition: transform 0.22s ease, opacity 0.22s ease;
		}

		.project-bar:hover .project-photo img {
			transform: scale(1.04);
			opacity: 0.92;
		}

		.project-content {
			padding: 24px 26px;
			display: flex;
			flex-direction: column;
			justify-content: center;
		}

		.project-top {
			display: flex;
			justify-content: space-between;
			margin-bottom: 7px;
			gap: 16px;
		}

		.project-name {
			font-size: 1.1rem;
			font-weight: 700;
			letter-spacing: 0.01em;
		}

		.project-date {
			font-size: 0.75rem;
			color: var(--gold);
			white-space: nowrap;
		}

		.project-type {
			font-size: 0.74rem;
			color: #b3b3b3;
			margin-bottom: 11px;
			text-transform: uppercase;
			letter-spacing: 0.08em;
		}

		.project-desc {
			font-size: 0.92rem;
			color: var(--muted);
			line-height: 1.65;
			margin-bottom: 14px;
		}

		.project-tags {
			display: flex;
			flex-wrap: wrap;
			gap: 7px;
		}

		.project-tag {
			font-size: 0.7rem;
			padding: 4px 10px;
			border-radius: 20px;
			border: 1px solid rgba(200,200,200,0.18);
			background: rgba(255,255,255,0.055);
			color: rgba(242,242,238,0.72);
		}

		.modal {
			position: fixed;
			inset: 0;
			z-index: 50;
			display: none;
			align-items: center;
			justify-content: center;
			background: rgba(0,0,0,0.74);
			padding: 36px;
			backdrop-filter: blur(6px);
		}

		.modal.show { display: flex; }

		.modal-card {
			width: min(1180px, 100%);
			max-height: 88vh;
			overflow-y: auto;
			background: linear-gradient(145deg, #343434, #242424);
			border: 1px solid rgba(200,200,200,0.22);
			border-radius: 20px;
			box-shadow: 0 30px 90px rgba(0,0,0,0.65);
		}

		.modal-header {
			display: flex;
			gap: 22px;
			padding: 24px;
			border-bottom: 1px solid rgba(255,255,255,0.1);
			background: rgba(255,255,255,0.02);
			align-items: center;
		}

		.modal-image {
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			width: 90px;
			height: 90px;
		}

		.modal-image img {
			max-width: 100%;
			max-height: 100%;
			width: auto;
			height: auto;
			object-fit: contain;
		}

		.modal-title { font-size: 1.45rem; margin-bottom: 7px; }

		.modal-type {
			font-size: 0.78rem;
			color: #b5b5b5;
			text-transform: uppercase;
			letter-spacing: 0.08em;
			margin-bottom: 12px;
		}

		.modal-desc {
			font-size: 0.94rem;
			line-height: 1.72;
			color: var(--muted);
			max-width: 720px;
		}

		.close-modal {
			margin-left: auto;
			align-self: flex-start;
			background: rgba(255,255,255,0.035);
			border: 1px solid var(--border);
			color: var(--white);
			border-radius: 10px;
			padding: 9px 13px;
			cursor: pointer;
			transition: background 0.2s ease, border-color 0.2s ease;
		}

		.close-modal:hover {
			background: rgba(255,255,255,0.09);
			border-color: rgba(255,255,255,0.25);
		}

		.modal-body {
			padding: 24px;
			display: grid;
			grid-template-columns: 0.85fr 1.15fr;
			gap: 26px;
		}

		.detail-box {
			background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 18px;
			box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
		}

		.detail-box h3 { font-size: 0.95rem; margin-bottom: 14px; letter-spacing: 0.02em; }

		.detail-box ul {
			list-style: none;
			display: flex;
			flex-direction: column;
			gap: 10px;
		}

		.detail-box li {
			color: var(--muted);
			font-size: 0.9rem;
			line-height: 1.6;
			padding-left: 18px;
			position: relative;
		}

		.detail-box li::before {
			content: "▸";
			position: absolute;
			left: 0;
			color: var(--gold);
		}

		#flowchart {
			width: 100%;
			min-height: 340px;
			background:
				linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
				linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px),
				rgba(0,0,0,0.2);
			background-size: 28px 28px;
			border: 1px solid rgba(255,255,255,0.12);
			border-radius: 14px;
			padding: 18px;
			overflow: auto;
		}

		#flowchart svg {
			width: 100%;
			height: auto;
			min-height: 290px;
			background: transparent;
		}

		#flowchart .edgePath path {
			stroke-width: 2.4px;
			filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35));
		}

		#flowchart text { font-weight: 700; letter-spacing: 0.01em; }

		@media (max-width: 800px) {
			.page { padding: 56px 24px; }
			.project-bar { grid-template-columns: 250px 1fr; align-items: center; }
			.modal-header { flex-direction: column; }
			.modal-image { width: 70px; height: 70px; }
			.modal-body { grid-template-columns: 1fr; }
		}
	</style>
</head>

<body>

<button class="close-btn" onclick="window.parent.postMessage('closeProjects', '*')">✕ Close</button>

<main class="page">
	<p class="section-label">Projects</p>
	<h1 class="page-title">What I've Built</h1>
	<section class="project-list" id="projectList"></section>
</main>

<div class="modal" id="modal">
	<div class="modal-card">
		<div class="modal-header">
			<div class="modal-image">
				<img id="modalImg" src="" alt="">
			</div>
			<div>
				<h2 class="modal-title" id="modalTitle"></h2>
				<p class="modal-type" id="modalType"></p>
				<p class="modal-desc" id="modalDesc"></p>
			</div>
			<button class="close-modal" onclick="closeModal()">Close</button>
		</div>
		<div class="modal-body">
			<div class="detail-box">
				<h3>What it does</h3>
				<ul id="modalBullets"></ul>
			</div>
			<div class="detail-box">
				<h3>System Flow</h3>
				<div id="flowchart"></div>
			</div>
		</div>
	</div>
</div>

<script>
	const graphStyle = `
classDef start fill:#3f4f5f,stroke:#cbd5e1,color:#f8fafc,stroke-width:1.5px;
classDef process fill:#4f6d5f,stroke:#cbd5e1,color:#f8fafc,stroke-width:1.5px;
classDef decision fill:#6b5f4a,stroke:#f5d06f,color:#f8fafc,stroke-width:1.5px;
classDef output fill:#5f4f63,stroke:#cbd5e1,color:#f8fafc,stroke-width:1.5px;
`;

	const projects = [
		{
			name: "Mini Me AI",
			date: "2026",
			type: "Local AI Systems",
			image: "images/mini-me-ai.png",
			desc: "A local AI assistant focused on running LLMs without relying on cloud APIs, integrating voice and real-time interaction.",
			tags: ["C++", "Python", "Ollama", "Piper", "Vosk"],
			bullets: [
				"Runs local LLM inference through Ollama instead of depending fully on external APIs.",
				"Uses voice input and text-to-speech to make the assistant feel more interactive.",
				"Connects local AI, personality behavior, and system-level constraints into one project."
			],
			chart: `
flowchart LR
	A((User Input)) --> B[Speech / Text]
	B --> C{Input Type}
	C --> D[Local LLM]
	C --> E[System Logic]
	D --> F[Response]
	E --> F
	F --> G((Voice Output))

${graphStyle}
	class A,G start;
	class B,D,E,F process;
	class C decision;
`
		},
		{
			name: "WasteLess AI",
			date: "2026",
			type: "Full Stack Web App",
			image: "images/wasteless-ai.png",
			desc: "A food redistribution platform connecting restaurants with surplus food to nearby shelters using location-based matching.",
			tags: ["Next.js", "React", "Supabase", "Leaflet", "NVIDIA API"],
			bullets: [
				"Restaurants submit extra food with location, availability, quantity, and pickup windows.",
				"The app compares shelter needs, distance, urgency, and constraints before matching.",
				"Map and backend data work together so the system feels practical instead of just visual."
			],
			chart: `
flowchart LR
	A((Restaurant)) --> B[Food Listing]
	B --> C{Match Check}
	C --> D[Location Data]
	C --> E[Shelter Needs]
	C --> F[Pickup Window]
	D --> G[Matching Logic]
	E --> G
	F --> G
	G --> H[Map View]
	G --> I((Shelter))

${graphStyle}
	class A,I start;
	class B,D,E,F,G,H process;
	class C decision;
`
		},
		{
			name: "ProfessorMatch",
			date: "2026",
			type: "Recommendation System",
			image: "images/professormatch.png",
			desc: "A system that ranks professors using combined datasets and explains recommendations based on student goals.",
			tags: ["Python", "pandas", "Streamlit", "FastAPI", "Data Cleaning"],
			bullets: [
				"Pulls together professor ratings, course data, and profile information.",
				"Uses ranking logic to match professors to goals like GPA, learning depth, or career value.",
				"Shows explainable results so students understand why each professor is recommended."
			],
			chart: `
flowchart LR
	A((Student Goal)) --> B{Goal Type}
	B --> C[Ratings Data]
	B --> D[Course Data]
	B --> E[Profile Data]
	C --> F[Data Cleaning]
	D --> F
	E --> F
	F --> G[Ranking Logic]
	G --> H[Streamlit UI]
	H --> I((Recommendation))

${graphStyle}
	class A,I start;
	class C,D,E,F,G,H process;
	class B decision;
`
		},
		{
			name: "Roguelike Maker",
			date: "2026",
			type: "Godot Game Generator",
			image: "images/roguelike-maker.png",
			desc: "A prompt-to-playable-game system where an AI generator creates JSON settings that directly change a Godot roguelike prototype.",
			tags: ["Godot", "GDScript", "JSON", "Game Systems", "AI Generator"],
			bullets: [
				"Split the project into two roles: one person handled Godot game systems while the other handled the AI generator.",
				"Built a config pipeline where prompts changed player speed, enemy density, enemy types, weapon type, and room sequence.",
				"Connected the generated JSON into Godot so changing the config directly changed gameplay.",
				"Focused on a realistic 24-hour hackathon scope: one weapon, two enemy types, a few rooms, and a working demo."
			],
			chart: `
flowchart LR
	A((Prompt)) --> B{AI Interprets}
	B --> C[Player Speed]
	B --> D[Enemy Density]
	B --> E[Room Sequence]
	B --> F[Weapon Type]
	C --> G[JSON Config]
	D --> G
	E --> G
	F --> G
	G --> H[Godot Config Loader]
	H --> I[Game Systems]
	I --> J((Playable Roguelike))

${graphStyle}
	class A,J start;
	class C,D,E,F,G,H,I process;
	class B decision;
`
		}
	];

	const projectList = document.getElementById("projectList");

	projects.forEach((p, index) => {
		const card = document.createElement("article");
		card.className = "project-bar";
		card.onclick = () => openModal(index);
		card.innerHTML = `
			<div class="project-photo">
				<img src="${p.image}" alt="${p.name}">
			</div>
			<div class="project-content">
				<div class="project-top">
					<div class="project-name">${p.name}</div>
					<div class="project-date">${p.date}</div>
				</div>
				<div class="project-type">${p.type}</div>
				<div class="project-desc">${p.desc}</div>
				<div class="project-tags">
					${p.tags.map(tag => `<span class="project-tag">${tag}</span>`).join("")}
				</div>
			</div>
		`;
		projectList.appendChild(card);
	});

	async function openModal(index) {
		const p = projects[index];
		document.getElementById("modalImg").src = p.image;
		document.getElementById("modalTitle").textContent = p.name;
		document.getElementById("modalType").textContent = p.type;
		document.getElementById("modalDesc").textContent = p.desc;
		document.getElementById("modalBullets").innerHTML =
			p.bullets.map(b => `<li>${b}</li>`).join("");
		document.getElementById("modal").classList.add("show");
		setTimeout(() => { window.renderMermaid(p.chart); }, 100);
	}

	function closeModal() {
		document.getElementById("modal").classList.remove("show");
		document.getElementById("flowchart").innerHTML = "";
	}

	document.getElementById("modal").addEventListener("click", e => {
		if (e.target.id === "modal") closeModal();
	});
</script>

</body>
</html>
