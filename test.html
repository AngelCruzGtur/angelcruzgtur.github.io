<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>3D Model Test</title>

	<style>
		body {
			margin: 0;
			background: #111;
			overflow: hidden;
		}

		canvas {
			display: block;
		}
	</style>
</head>

<body>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
	45,
	window.innerWidth / window.innerHeight,
	0.1,
	1000
);

camera.position.z = 40;

const renderer = new THREE.WebGLRenderer({
	antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

// color fix
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;

document.body.appendChild(renderer.domElement);

// lighting
scene.add(new THREE.AmbientLight(0xffffff, 2));

const light1 = new THREE.DirectionalLight(0xffffff, 3);
light1.position.set(5, 10, 10);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0xffffff, 2);
light2.position.set(-5, 5, 10);
scene.add(light2);

let model;

// movement
let x = 0;
let y = 0;

let vx = (Math.random() - 0.5) * 0.4;
let vy = (Math.random() - 0.5) * 0.4;

// rotation physics
let rotVelX = 0;
let rotVelY = 0;
let rotVelZ = 0;

const loader = new GLTFLoader();

loader.load(
	"model.glb",
	gltf => {
		model = gltf.scene;

		model.scale.set(4, 4, 4);

		// fix forward direction (adjust if needed)
		model.rotation.y = Math.PI;

		scene.add(model);

		animate();
	},
	undefined,
	err => {
		console.error("FAILED TO LOAD MODEL:", err);
	}
);

function getBounds() {
	const d = camera.position.z;
	const h = 2 * Math.tan((camera.fov * Math.PI) / 360) * d;
	const w = h * camera.aspect;

	return {
		left: -w / 2,
		right: w / 2,
		top: h / 2,
		bottom: -h / 2
	};
}

function animate() {
	requestAnimationFrame(animate);

	if (!model) return;

	const b = getBounds();
	const padding = 4;

	x += vx;
	y += vy;

	let hitWall = false;

	if (x <= b.left + padding) {
		x = b.left + padding;
		vx *= -1;
		hitWall = true;
	}

	if (x >= b.right - padding) {
		x = b.right - padding;
		vx *= -1;
		hitWall = true;
	}

	if (y <= b.bottom + padding) {
		y = b.bottom + padding;
		vy *= -1;
		hitWall = true;
	}

	if (y >= b.top - padding) {
		y = b.top - padding;
		vy *= -1;
		hitWall = true;
	}

	// slight drift
	vx += (Math.random() - 0.5) * 0.01;
	vy += (Math.random() - 0.5) * 0.01;

	const max = 0.45;
	vx = Math.max(-max, Math.min(max, vx));
	vy = Math.max(-max, Math.min(max, vy));

	// rotation physics
	if (hitWall) {
		rotVelX += (Math.random() - 0.5) * 0.25;
		rotVelY += (Math.random() - 0.5) * 0.35;
		rotVelZ += (Math.random() - 0.5) * 0.25;
	}

	rotVelX += vy * 0.02;
	rotVelY += vx * 0.03;
	rotVelZ += vx * 0.01;

	rotVelX *= 0.94;
	rotVelY *= 0.94;
	rotVelZ *= 0.94;

	model.position.set(x, y, 0);

	model.rotation.x += rotVelX;
	model.rotation.y += rotVelY;
	model.rotation.z += rotVelZ;

	renderer.render(scene, camera);
}

window.addEventListener("resize", () => {
	camera.aspect = window.innerWidth / window.innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
